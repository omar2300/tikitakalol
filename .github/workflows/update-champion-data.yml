name: Update Champion Data

on:
  schedule:
    - cron: '0 18 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-champion-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Update champion data
        run: node scripts/update-champions.js

      - name: Commit updated data
        run: |
          if git diff --quiet -- championData.json; then
            echo "No champion data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add championData.json
          git commit -m "chore: update champion data"
          git push